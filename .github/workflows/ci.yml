name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: Detect runtime stack
    runs-on: ubuntu-latest
    outputs:
      has_web: ${{ steps.check.outputs.has_web }}
      has_e2e: ${{ steps.check.outputs.has_e2e }}
    steps:
      - uses: actions/checkout@v6

      - name: Check planning artifacts
        run: |
          set -e
          test -f docs/brief.md
          test -f docs/prd.md
          test -f docs/architecture.md
          test -f docs/front-end-spec.md
          test -d supabase/migrations
          ls supabase/migrations/*.sql > /dev/null
          echo "Planning artifacts OK"

      - name: Detect stack flags
        id: check
        run: |
          if [ -f apps/web/package.json ]; then
            echo "has_web=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_web=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f apps/web/playwright.config.ts ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  lint-test-build:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_web == 'true'
    # Integration suites under apps/web/integration and packages/db/tests
    # use these vars to talk to softhair-dev via service-role; without them
    # they `describe.skipIf` so PRs from forks (no secret access) still pass.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        # version is driven by `packageManager` field in package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # TEMP DIAGNOSTIC #2 (4.2-TEST-001 PR #34): bypass SDK with raw curl
      # to isolate whether the failure is in @supabase/supabase-js or in the
      # env value itself. Prints key shape + HTTP status only.
      - name: Diagnostic — raw REST probe
        run: |
          echo "URL=$NEXT_PUBLIC_SUPABASE_URL"
          echo "ANON head=${NEXT_PUBLIC_SUPABASE_ANON_KEY:0:6} tail=${NEXT_PUBLIC_SUPABASE_ANON_KEY: -4} len=${#NEXT_PUBLIC_SUPABASE_ANON_KEY}"
          echo "SRV  head=${SUPABASE_SERVICE_ROLE_KEY:0:6} tail=${SUPABASE_SERVICE_ROLE_KEY: -4} len=${#SUPABASE_SERVICE_ROLE_KEY}"
          echo "--- probe with ANON key ---"
          curl -sS -o /tmp/anon.out -w "HTTP=%{http_code}\n" \
            "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/service_catalog?select=id&limit=1" \
            -H "apikey: $NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $NEXT_PUBLIC_SUPABASE_ANON_KEY"
          head -c 200 /tmp/anon.out; echo
          echo "--- probe with SRV key ---"
          curl -sS -o /tmp/srv.out -w "HTTP=%{http_code}\n" \
            "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/professionals?select=id&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
          head -c 200 /tmp/srv.out; echo
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [detect, lint-test-build]
    if: needs.detect.outputs.has_e2e == 'true'
    # HARD.1: continue-on-error is intentional for the first ~1 week post-merge to
    # avoid blocking legitimate PRs while we shake out flake (RISK-FLAKY in story).
    # TODO(HARD.1 follow-up): remove this line after 1 week of stable green E2E.
    # Tracking: docs/qa/backlog.md will get a new item when this lands.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit]
    env:
      # Build embeds NEXT_PUBLIC_* into the bundle; runtime needs all three.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (${{ matrix.browser }})
        run: pnpm --filter @softhair/web exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E (${{ matrix.browser }})
        run: pnpm --filter @softhair/web exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload trace + video on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.browser }}
          path: apps/web/test-results/
          retention-days: 3

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [detect, lint-test-build]
    if: needs.detect.outputs.has_web == 'true'
    # Initial rollout: thresholds mostly as `warn` in lighthouserc.json —
    # promote to `error` after 2-3 stable PRs (tracked in docs/qa/backlog.md 1.7-PERF-002).
    # Follow-up: expand to auth-gated routes once a test-login fixture is set up.
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Lighthouse CI
        working-directory: apps/web
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: pnpm lhci
