name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Passa gracefully enquanto o scaffold Next.js (Story 1.1) não existe.
  # Quando apps/web existir, os jobs de lint/typecheck/test/build serão
  # ativados automaticamente pela detecção de package.json com scripts.
  sanity:
    name: Repo sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required planning docs exist
        run: |
          set -e
          test -f docs/brief.md
          test -f docs/prd.md
          test -f docs/architecture.md
          test -f docs/front-end-spec.md
          echo "✓ All planning docs present"

      - name: Verify DB migrations exist
        run: |
          set -e
          test -d packages/db/migrations
          ls packages/db/migrations/*.sql >/dev/null
          echo "✓ DB migrations present"

      - name: Detect runtime stack
        id: detect
        run: |
          if [ -f apps/web/package.json ]; then
            echo "has_web=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_web=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report detection
        run: |
          echo "Web app present: ${{ steps.detect.outputs.has_web }}"
          if [ "${{ steps.detect.outputs.has_web }}" = "false" ]; then
            echo "Skipping lint/test/build — scaffold pending Story 1.1"
          fi

  lint-test-build:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    needs: sanity
    # Só roda quando apps/web for scaffolded (Story 1.1)
    if: ${{ hashFiles('apps/web/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # Placeholder para futuro — ativado quando e2e tests existirem
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ hashFiles('apps/web/playwright.config.ts') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps
      - run: pnpm test:e2e
