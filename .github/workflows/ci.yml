name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: Detect runtime stack
    runs-on: ubuntu-latest
    outputs:
      has_web: ${{ steps.check.outputs.has_web }}
      has_e2e: ${{ steps.check.outputs.has_e2e }}
    steps:
      - uses: actions/checkout@v4

      - name: Check planning artifacts
        run: |
          set -e
          test -f docs/brief.md
          test -f docs/prd.md
          test -f docs/architecture.md
          test -f docs/front-end-spec.md
          test -d supabase/migrations
          ls supabase/migrations/*.sql > /dev/null
          echo "Planning artifacts OK"

      - name: Detect stack flags
        id: check
        run: |
          if [ -f apps/web/package.json ]; then
            echo "has_web=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_web=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f apps/web/playwright.config.ts ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  lint-test-build:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_web == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is driven by `packageManager` field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [detect, lint-test-build]
    if: needs.detect.outputs.has_e2e == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is driven by `packageManager` field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps
      - run: pnpm test:e2e

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [detect, lint-test-build]
    if: needs.detect.outputs.has_web == 'true'
    # Initial rollout: thresholds mostly as `warn` in lighthouserc.json —
    # promote to `error` after 2-3 stable PRs (tracked in docs/qa/backlog.md 1.7-PERF-002).
    # Follow-up: expand to auth-gated routes once a test-login fixture is set up.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Lighthouse CI
        working-directory: apps/web
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: pnpm lhci
