storyId: "4.1"
storyTitle: "Commission Rule Engine"
verdict: CONCERNS
verdictRationale: |
  All 6 ACs implemented and verified independently. Engine quality is excellent
  — pure functions, integer-cents math (no float drift), well-documented 3-tier
  precedence rule (ADR-0004), 26 unit tests covering precedence + boundaries +
  rounding + meaningful-zero distinction + defensive cases. Schema migration
  applied to softhair-dev cleanly. RLS in paridade with existing pattern.
  Build green (2.05 kB simulator + 3.1 kB matrix page).

  Verdict is CONCERNS (not PASS) for ONE deployment-timing concern + three
  code-quality observations:

  1. **DEPLOY-001 (MEDIUM)**: softhair-prod migration is NOT applied yet.
     Same operational pattern as Story 2.5 — schema-additive, low-risk to
     deploy ahead of app code. @devops MUST apply migration to prod BEFORE
     deploying app, otherwise the new `professional_service_commissions`
     queries will fail in production.

  2. **DRY-001 (MEDIUM)**: `commission-table-panel.tsx::resolveRowSource()`
     duplicates the engine logic from `apps/web/lib/commission/resolve-rate.ts`.
     Both produce the same result today, but the panel implementation is
     simplified (no professional.commissionMode check because it's only rendered
     when mode === 'TABLE'). Risk: silent divergence if engine logic changes.
     Should refactor to call the canonical engine.

  3. **DOC-001 (LOW)**: `calculate.ts` JSDoc comment line 8 describes
     `amount_cents = round(price_brl * 100 * percent)` which would yield 100x
     the correct result. The actual code uses two-step rounding that is
     mathematically correct. Doc comment misleads the next reader.

  4. **SECURITY-001 (LOW)**: Server Actions (`setCommissionTableEntry`,
     `bulkSetProfessionalServiceCommissions`) have NO app-level role gating.
     Any salon member (including PROFESSIONAL role) can call them. RLS allows
     this because the policy is `FOR ALL` — convention-consistent with
     `professionals_all` and `services_all` shipped in Story 1.1. However for
     a finance-sensitive operation, OWNER/RECEPTIONIST gating is reasonable.

  None of these block merge. The implementation is ready to ship; concerns
  are tracked as backlog items.

