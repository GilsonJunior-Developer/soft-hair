acceptanceCriteriaCoverage:
  AC1_two_modes_PERCENT_FIXED_and_TABLE:
    status: PASS
    evidence: |
      PERCENT_FIXED mode pre-shipped Story 1.5 (radio + default_percent input
      in professional-form.tsx:31, 322-336). TABLE mode now has backing data
      via new table `professional_service_commissions` + matrix UI in
      `commission-table-panel.tsx` (rendered only when mode === 'TABLE' per
      page.tsx:48). Engine in `resolve-rate.ts` distinguishes both modes
      (line 24: TABLE mode + entry → tier 1; otherwise tier 2/3). 12 unit
      tests cover all permutations (resolve-rate.test.ts).
  AC2_service_override_overrides_professional_default:
    status: PASS
    evidence: |
      `services.commission_override_percent` shipped Story 1.6 (verified in
      service-form.tsx:73 + actions.ts:76,115). Engine consumes it as tier 2
      in resolveRate (resolve-rate.ts:32-37). resolve-rate.test.ts:33-41
      covers PERCENT_FIXED+override path; :60-72 covers TABLE-fallback-to-
      override; meaningful-zero distinction tested at :109-118.
  AC3_sum_prof_plus_salon_equals_100:
    status: PASS
    evidence: |
      UI displays salon share derived as `100 - prof_pct` in real-time:
      commission-table-panel.tsx:269 (matrix) + commission-simulator.tsx:113
      (simulator). Schema CHECK `BETWEEN 0 AND 100` on
      `professional_service_commissions.percent` enforces range at DB level.
      No `salon_percent` field needed — derivation is mathematical identity.
      Per @po validation 2026-05-02 — interpretation approved.
  AC4_simulator_interactive:
    status: PASS
    evidence: |
      `commission-simulator.tsx` renders dropdowns (professional + service) +
      qty (1-100) + unit price inputs; `useMemo` recomputes resolveRate +
      calculateCommission on input change (lines 86-122); output text matches
      PRD example format ("Se você fizer X serviço a R$ Y, profissional ganha
      R$ Z"). Source label badge shown for transparency (line 215+). Located
      at /configuracoes/comissao with link from /configuracoes index page.
  AC5_history_immutability:
    status: PASS
    evidence: |
      Engine in `apps/web/lib/commission/` is pure — does NOT import any
      Supabase client. Server Actions in profissionais/actions.ts only
      reference `professional_service_commissions` (new table), NEVER
      `commission_entries`. Verified structurally:
      `grep -r 'UPDATE.*commission_entries\|.update.*commission_entries' apps/web/`
      returns ZERO matches. Story 4.2 will be the first writer to
      commission_entries (snapshot pattern). Schema design enforces it:
      commission_entries has snapshot fields (`percent_applied`,
      `commission_amount_brl`) captured at COMPLETED time.
  AC6_unit_test_extensive:
    status: PASS
    evidence: |
      26 vitest tests in `apps/web/lib/commission/{resolve-rate,calculate}.test.ts`.
      resolve-rate (12 tests): 3-tier precedence × 5 fallback combinations,
      boundaries 0%/100%, meaningful-zero (entry=0 vs null), defensive (mode
      mismatch), realistic PRD scenario. calculate (14 tests): PRD example
      (R$50 × 40% = R$20), simple, zero, 100%, large numbers, rounding HALF_UP
      (33.33%×R$10=3.33, 33.33%×R$9.97=3.32, 0.5-cent boundary), float drift
      avoidance (0.1×30%=0.03 exact), throws on bad input, discounted-price
      contract.

sevenChecksFromStoryLifecycle:
  code_review:
    status: PASS_WITH_NOTE
    notes: |
      Engine code is exemplary — pure functions, integer-cents math, jsdoc
      with precedence rule documented, 100% test coverage on the 2 functions.
      Server Actions follow existing pattern (ActionResult union, Zod validation,
      revalidatePath). UI component structure mirrors existing patterns
      (commission-table-panel separates business state into useMemo, draft state
      kept local in CommissionRow). One soft-DRY violation in panel
      (resolveRowSource duplicates engine) — see DRY-001 below.
  unit_tests:
    status: PASS
    notes: |
      63/63 passing across 8 test files. New: 12 in resolve-rate.test.ts +
      14 in calculate.test.ts. Edge cases excellent (meaningful zero,
      float drift, HALF_UP rounding at .5 boundary). No tests for Server
      Actions yet (see TEST-002).
  acceptance_criteria:
    status: PASS
    notes: "All 6 ACs implemented and validated above with file:line evidence."
  no_regressions:
    status: PASS
    notes: |
      37 baseline tests preserved unchanged (appointment-token, cancel-window,
      clientes/actions, login/actions, search-query, healthz). Pre-existing
      routes (profissionais/[id], configuracoes) modified additively only —
      isTableMode conditional branch preserves PERCENT_FIXED-mode professionals
      unchanged.
  performance:
    status: PASS
    notes: |
      Engine is O(1) — pure functions with no I/O. Page load: 2 parallel
      queries (Promise.all) only when TABLE mode is active. Indexed lookups:
      UNIQUE (professional_id, service_id) auto-creates index for engine
      hot-path; secondary `idx_psc_professional_id` for matrix UI fetch.
      Build sizes minimal (2.05 kB simulator, 3.1 kB profissionais detail).
  security:
    status: PASS_WITH_NOTE
    notes: |
      Strengths:
      - RLS on professional_service_commissions in paridade com existing
        pattern (FOR ALL, salon_id-based)
      - Zod validation 0-100 on Server Action input
      - No SQL injection risk (Supabase client uses parameterized queries)
      - No secrets in code; no console.log of sensitive data
      - error logs use prefixed format ([setCommissionTableEntry] / [bulkSet...])

      Notes:
      - SECURITY-001: No app-level role gating (PROFESSIONAL can call actions).
      - DATA-001: No FK consistency check (salon_id == prof.salon_id ==
        service.salon_id). RLS prevents cross-salon read but allows orphan
        rows on degenerate input. Theoretical, ~0 exploitability.
  documentation:
    status: PASS
    notes: |
      ADR-0004 documents 3-tier precedence + immutability invariant + 3
      alternatives rejected with rationale. Migration file has rich header
      comment + COMMENT ON TABLE + COMMENT ON COLUMN. packages/db/README.md
      v0.3.0 with new "Commission tables (Story 4.1)" section. Decision log
      `.ai/decision-log-4.1.md` captures 5 autonomous decisions made in YOLO
      mode (D-001 migration via MCP, D-002 NUMERIC choice, D-003 lib location,
      D-004 pure functions, D-005 mode-flip preservation).

issues:
  - id: DEPLOY-001
    severity: medium
    category: deployment
    description: |
      Migration `20260502000000_story_4_1_professional_service_commissions`
      applied to softhair-dev only. App code (release branch) depends on
      `professional_service_commissions` table. If @devops merges + deploys
      app before applying migration to prod, the matrix-mode professional
      detail page query and simulator's entries fetch will fail.
    recommendation: |
      @devops MUST apply migration to softhair-prod BEFORE deploying the app.
      Sequence:
      1. Apply migration via Supabase MCP or Dashboard SQL editor (idempotent
         due to IF NOT EXISTS)
      2. Verify table exists + RLS policy active + index created
      3. Merge PR to main
      4. Vercel deploys app
      5. Smoke test on prod: navigate to a TABLE-mode professional's detail
         page, verify matrix renders; navigate to /configuracoes/comissao,
         verify simulator works.
      Migration is schema-additive (CREATE TABLE IF NOT EXISTS) — safe to
      deploy ahead of app code.
    blockingMerge: false
    blockingDeploy: true

  - id: DRY-001
    severity: medium
    category: tech-debt
    description: |
      `apps/web/app/(dashboard)/profissionais/[id]/commission-table-panel.tsx`
      lines 38-56 (`resolveRowSource()`) duplicates the engine logic from
      `apps/web/lib/commission/resolve-rate.ts::resolveRate()`. Today both
      yield the same result for the panel context (TABLE mode only), but
      they are independent code paths that could diverge silently if the
      canonical precedence rule changes.
    recommendation: |
      Refactor commission-table-panel.tsx to call `resolveRate()` from
      the canonical engine. Pass professional state via props (already
      has `professionalDefaultPercent`; add `commissionMode='TABLE'` literal).
      Alternative: extract the common shape into a wrapper helper. Either
      way, eliminate the duplication. ~10 minutes of work; can be a quick-win
      follow-up after merge.
    blockingMerge: false

  - id: DOC-001
    severity: low
    category: docs
    description: |
      `apps/web/lib/commission/calculate.ts` JSDoc lines 7-9 describe the math
      as `amount_cents = round(price_brl * 100 * percent)` followed by
      `amount_brl = amount_cents / 10000`. This describes a single-rounding
      formulation that yields 100× the correct result. The actual code (lines
      36-38) uses a two-step rounding that is mathematically correct.
    recommendation: |
      Update the JSDoc to match the actual math:
      ```
      Math (avoiding float drift):
        priceInCents      = round(price_brl * 100)
        commissionInCents = round(priceInCents * percent / 100)
        amount_brl        = commissionInCents / 100
      ```
      ~2 minutes of work. Safe to do as part of DRY-001 follow-up.
    blockingMerge: false

  - id: SECURITY-001
    severity: low
    category: authorization
    description: |
      Server Actions `setCommissionTableEntry` and
      `bulkSetProfessionalServiceCommissions` rely solely on RLS for
      authorization. RLS policy is `FOR ALL salon_id IN current_user_salon_ids()`
      — convention-consistent with existing tables (professionals_all,
      services_all) per Story 1.1. However for a finance-sensitive operation,
      restricting writes to OWNER/RECEPTIONIST roles would be reasonable.
      A PROFESSIONAL salon member can currently edit their own commission
      rates via the Server Action.
    recommendation: |
      Backlog item: add `is_salon_owner_or_receptionist()` check at action
      entry. Could be a generic helper (no such function exists in
      `current_user_salon_ids()` family — only `is_salon_owner()` exists).
      Could fix the entire Story 1.1 family of FOR ALL policies in a
      hardening pass. Not blocking 4.1 — convention-consistent.
    blockingMerge: false

  - id: TEST-001
    severity: low
    category: tests
    description: |
      No integration tests for Server Actions (setCommissionTableEntry,
      bulkSetProfessionalServiceCommissions). Engine has 26 unit tests but
      the action layer (Zod validation, Supabase client interaction, error
      paths) is uncovered.
    recommendation: |
      Add vitest tests with mocked Supabase client (precedent:
      `app/(dashboard)/clientes/actions.test.ts` covers `softDeleteClient`
      and `updateAppointmentNotes` with this pattern). Cover: percent boundary
      validation rejection, salon_id missing, delete vs upsert paths, bulk
      onlyEmpty filter. ~30 minutes of work. Not blocking — can be added
      before Story 4.2 (which will rely on these actions' contracts).
    blockingMerge: false

  - id: TEST-002
    severity: low
    category: tests
    description: |
      No E2E (Playwright) coverage for the matrix UI or simulator. Story
      Dev Notes line 222-223 explicitly mark E2E as "non-blocking, recommended
      hygiene". HARD.1 established the E2E baseline; new UI surfaces should
      ideally have at least a smoke spec.
    recommendation: |
      Backlog item HARD.1-FU-003 or 4.1-TEST-001: add
      `apps/web/e2e/commission-config.spec.ts` covering: open simulator, pick
      prof + service, set qty=10 + price=50, assert commission resolves
      correctly with the right source label. Also: open a TABLE-mode prof's
      detail page, expand the matrix, set a percent, assert it persists. ~1
      hour of work. Not blocking; can be promoted to P0 if Story 4.2 has
      test gaps.
    blockingMerge: false

  - id: DATA-001
    severity: low
    category: data-integrity
    description: |
      `professional_service_commissions` schema has FK to professionals(id)
      and services(id) but no CHECK constraint that
      `salon_id = professional.salon_id` AND `salon_id = service.salon_id`.
      A user member of multiple salons could theoretically write a row with
      mismatched salon. RLS prevents reading from the wrong-salon perspective,
      so harm is limited to data hygiene, not privilege escalation.
    recommendation: |
      Optional: add a trigger or CHECK constraint enforcing FK consistency.
      Simpler alternative: validate in Server Action. ~10 minutes. Not
      blocking — exploitability is ~0 (requires multi-salon membership +
      knowing UUIDs of cross-salon entities).
    blockingMerge: false

