  - id: WAIVER-CODERABBIT-DEV-4.3
    description: "CodeRabbit pre-commit (dev workflow) not run — WSL infra missing"
    rationale: |
      Founder dev machine has no WSL; CodeRabbit CLI unavailable. Same
      pattern as 2.5/2.7/HARD.1/4.1/4.2/4.2-TEST-001 (all merged without
      CLI). GitHub App PR review will run on push if installed (tracked
      in MNT-DEVOPS-001). Manual review covered equivalent depth.
    expiresAt: "When MNT-DEVOPS-001 is closed"

  - id: WAIVER-CODERABBIT-QA-4.3
    description: "CodeRabbit qa-review (committed mode) not run — same WSL infra issue"
    rationale: |
      Same as above. Manual review independently re-ran lint + typecheck +
      113 tests + build, audited:
      - actions.ts read pattern + RLS reasoning + NO PostgREST embed
      - period.ts SP-timezone conversion correctness
      - csv.ts Brazilian payroll convention compliance
      - commission-report-client.tsx a11y (aria-expanded, aria-controls,
        scope=col, role=region, aria-labelledby)
      - print stylesheet safety (static dangerouslySetInnerHTML)
      - integration test perf sentinel + framework hardening fixes
    expiresAt: "When MNT-DEVOPS-001 is closed"

  - id: WAIVER-PDF-AUTOMATED-TEST
    description: "PDF export via print-CSS not testable via Playwright"
    rationale: |
      Browsers do not expose print preview content to automation tooling.
      Print-CSS strategy was the @po-approved approach (F2 → print-CSS
      vs @react-pdf/renderer or Puppeteer). Manual verification documented
      as 4.3-TEST-001 backlog item; non-blocking since test salon has
      fixture data and Founder can verify with 1 click before first
      paying salon ships.
    expiresAt: "After Founder manually verifies print preview in 2 browsers"

