storyId: "2.5"
storyTitle: "Client History & Profile"
verdict: CONCERNS
verdictRationale: |
  All 6 ACs implemented and verified. Code quality is high — defense-in-depth
  RLS pattern, ARIA on the editor, text-node rendering (XSS-safe), Promise.all
  parallel fetches, idempotent migration with REVOKE PUBLIC + REVOKE anon
  (gotcha-aware). Test coverage solid for the unit-test layer. Live schema
  state in softhair-dev confirms migration intent. Performance budget atendido
  with 800x/30x/130x headroom over the 50ms target.

  Verdict is CONCERNS (not PASS) for ONE deployment-timing concern:
  softhair-prod migration is NOT applied yet, and the app code (release
  branch) depends on `appointments.notes` column. If @devops merges and
  deploys the app before applying the migration to prod, the detail page
  query `select notes` will fail until PostgREST refreshes its schema cache.

  This is operational, not a code defect — the migration file is in the repo,
  ready for @devops. Documenting as HIGH-severity operational concern with
  explicit sequencing requirement in the gate notes.

  Other items (in-memory aggregation boundary, manual types patch, minor UX
  details) are documented tech debt with clear thresholds — none warrant
  blocking the story.

