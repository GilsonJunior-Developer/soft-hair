issues:
  - id: DEPLOY-001
    severity: high
    category: deployment
    description: "softhair-prod migration `20260427000000_story_2_5_appointments_notes` is NOT applied yet. The app code branch depends on `appointments.notes` column. If @devops merges + deploys app before applying migration to prod, the detail page query `select notes` will fail."
    recommendation: "@devops MUST apply migration to softhair-prod BEFORE deploying the app. Sequence: (1) merge PR, (2) apply migration to softhair-prod (via Supabase MCP or dashboard SQL editor), (3) deploy Vercel app. PostgREST will need to refresh its schema cache (automatic but may have ~30s delay). Consider applying the migration FIRST (schema-additive ALTER ADD COLUMN is safe to deploy ahead — RPC sync change is also safe because old RPC already accepted p_notes silently)."
    blockingMerge: false
    blockingDeploy: true

  - id: PERF-002
    severity: medium
    category: performance
    description: "In-memory aggregation in clients/page.tsx fetches ALL non-deleted clients of the salon before paginating. Bounded by 'few thousand clients' per Dev Notes. For salons reaching 5000+ clients (or empty search returning all), memory + sort cost grows O(n)."
    recommendation: "Document threshold (e.g., 5000 clients per salon) and add lightweight observability (log salon_id + client count when > 2000). When threshold hit, materialize clients_with_stats view (security_invoker = true, same pattern as 20260423000001_public_views_invoker_mode.sql). Not blocking MVP — design-partner scope is 2-10 pros = expected ~500-1500 clients."
    blockingMerge: false

  - id: TYPES-003
    severity: low
    category: tech-debt
    description: "packages/db/types/database.ts manually patched to add `notes` to appointments Row/Insert/Update. Full types regen via Supabase CLI deferred."
    recommendation: "Schedule full types regen at start of Epic 3 (WhatsApp tables will need it anyway). Keep manual patch documented in story Change Log (v0.7) for traceability."
    blockingMerge: false

  - id: UX-004
    severity: low
    category: accessibility
    description: "NotesEditor toggle button hardcodes aria-expanded='false' (line 59). When editor is OPEN, the button is unmounted, so aria-expanded never reflects 'true'. Strictly speaking, aria-expanded is meant for elements that toggle other content while remaining mounted."
    recommendation: "Optional: refactor to always render the toggle button and conditionally render the textarea, with aria-expanded toggling. Current behavior is functional and screen-reader users get the label change ('Editar' vs '+ Adicionar') as feedback. Not blocking."
    blockingMerge: false

  - id: TEST-005
    severity: low
    category: tests
    description: "setTimeout in NotesEditor (line 40) clearing 'Salvo ✓' indicator is not cleared on unmount. Theoretical memory leak in rapid mount/unmount cycles."
    recommendation: "Optional: wrap in useEffect with cleanup, or use a ref-tracked timer id. Current behavior negligible in practice (component is short-lived, callback is cheap)."
    blockingMerge: false

  - id: VALIDATION-006
    severity: low
    category: input-validation
    description: "Server actions (softDeleteClient, updateAppointmentNotes) don't pre-validate UUID format on input ids. PostgreSQL rejects with type error caught by error handler — functionally safe but error message is generic."
    recommendation: "Optional: add z.string().uuid() to action signatures for cleaner error messages. Not blocking — current behavior is secure, just less debuggable."
    blockingMerge: false

