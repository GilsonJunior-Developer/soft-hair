draft_summary: |
  Engine consumer story (no new schema, no engine math). Single Server Action
  extension (`transitionAppointmentStatus`) + dialog UI tweak + tests. Lower
  complexity than 4.1 because all dependencies pre-existing. 7 tasks (1-2 core,
  3-4 tests, 5-7 carry-over/optional).

  Architectural decision documented: Server Action as writer (Option B), NOT
  RPC extension or trigger (Option A). Rationale: engine stays in JS for
  testability; AC5 immutability satisfied by pure-function engine + UNIQUE
  constraint idempotency; failure mode (commission insert fails) is recoverable.

self_check_against_story_draft_checklist:
  result: READY
  clarity_score: 9
  partial_items:
    - "AC5 multi-service interpretation flagged — SM picks 'test matrix' reading; @po confirms"
  flags_for_po:
    - id: "FLAG-WORKER-VS-ACTION"
      severity: MEDIUM
      desc: |
        PRD AC1 says "worker calcula" — but project has no Inngest/queue infra
        yet (would be Phase 2 territory). SM proposes synchronous Server Action
        post-RPC. Justifications in Dev Notes (testability + AC5 invariant
        unaffected + idempotency via UNIQUE constraint).

        @po decision: approve Option B as drafted, OR insist on async worker
        (would block 4.2 until queue infra added).

        Recommendation: approve B. PRD's "worker" terminology was likely
        planning vocab, not architectural mandate. AC1 user-visible contract
        ("automatic, no manual input") is satisfied either way.

    - id: "FLAG-AC5-MULTI-SERVICE"
      severity: LOW
      desc: |
        PRD AC5 reads: "Testes unit cobrem: ... múltiplos serviços no mesmo
        agendamento". Schema is 1:1 (appointments.service_id is single UUID).

        SM interpretation: test against varied service TYPES (corte, coloração,
        etc.), NOT one appointment with multiple services. Schema doesn't support
        the latter and changing it is an epic-level concern.

        @po decision: approve interpretation OR defer 4.2 until multi-service
        schema exists.

        Recommendation: approve. PRD likely intended "ensure engine handles
        diverse service rates correctly", which the test matrix covers.

    - id: "FLAG-CARRY-OVER-BUNDLING"
      severity: LOW
      desc: |
        Story 4.2 Tasks 5+3.4 absorb 2 carry-over backlog items from 4.1:
        - 4.1-DOC-001 (jsdoc fix, ~2 min) — Task 5
        - 4.1-TEST-001 (action integration tests, ~30 min) — Task 3.4

        Both are highly relevant (4.2 also adds a Server Action that needs
        testing). 4.1-MNT-001 (DRY refactor of panel) stays separate.

        @po decision: approve bundling OR strip them out and keep 4.2 focused.

        Recommendation: approve bundling. Same testing harness, same domain.

