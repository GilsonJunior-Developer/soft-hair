requested_migration:
  description: "Adicionar coluna `notes TEXT` em `public.appointments` para suportar AC4 da Story 2.5"
  ddl: |
    -- Migration suggested name: 20260427000000_appointments_notes_column.sql
    BEGIN;

    ALTER TABLE public.appointments
      ADD COLUMN IF NOT EXISTS notes TEXT;

    COMMENT ON COLUMN public.appointments.notes IS
      'Observações do atendimento (free text, registradas pelo staff pós-serviço). Story 2.5.';

    -- Atualizar create_appointment_atomic para escrever p_notes que já é aceito como parâmetro
    -- (RPC fica em sync com o schema; param deixou de ser vestigial)
    CREATE OR REPLACE FUNCTION public.create_appointment_atomic(
      p_professional_id UUID,
      p_service_id UUID,
      p_scheduled_at TIMESTAMPTZ,
      p_client_id UUID DEFAULT NULL,
      p_client_name TEXT DEFAULT NULL,
      p_client_phone TEXT DEFAULT NULL,
      p_client_email TEXT DEFAULT NULL,
      p_notes TEXT DEFAULT NULL,
      p_source TEXT DEFAULT 'MANUAL_BY_STAFF'
    )
    RETURNS public.appointments
    LANGUAGE plpgsql
    SECURITY DEFINER
    SET search_path = public
    AS $$
    -- ... (corpo idêntico ao 20260422000005, exceto pelo INSERT que agora inclui `notes`)
    -- Insert section change:
    --   INSERT INTO public.appointments (..., source, cancel_token, notes)
    --   VALUES (..., p_source::public.appointment_source, v_cancel_token, p_notes)
    $$;

    -- RLS: NÃO precisa de policy nova. Policies existentes em appointments cobrem
    -- SELECT/UPDATE per salon_id automaticamente. notes herda essas policies.

    COMMIT;

  rls_check: |
    Verify after apply:
    SELECT polname, polcmd, polqual::text
    FROM pg_policy
    WHERE polrelid = 'public.appointments'::regclass;

    Expected: existing salon_id-scoped policies cobrem leitura/escrita de notes
    automaticamente (notes faz parte do row, RLS é row-level).

  no_index_needed: "notes não é searchable na Story 2.5 (só read/edit per-appointment). Sem GIN ou trgm necessário."

