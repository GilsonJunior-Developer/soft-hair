  branch: feature/2.5-client-history
  commits_ahead: 7
  epic_close: "Last story of Epic 2 — approval + deploy fecha Epic 2 = 100% (7/7)"

deploy_sequence:
  critical_warning: |
    Migration `20260427000000_story_2_5_appointments_notes` is APPLIED to
    softhair-dev but NOT to softhair-prod. App code branch reads
    `appointments.notes` column. If app deploys before migration applies,
    detail page will fail with PostgREST schema error.

  required_order:
    - step: 1
      action: "Apply migration to softhair-prod"
      how: |
        Option A — via Supabase MCP (recommended, audit trail):
          mcp__supabase__apply_migration(
            project_id='zqubqygagvtmvvljbstc',
            name='story_2_5_appointments_notes',
            query=<contents of supabase/migrations/20260427000000_story_2_5_appointments_notes.sql>
          )

        Option B — via Supabase dashboard SQL editor:
          Copy/paste full migration file content, execute as one transaction

    - step: 2
      action: "Audit prod state matches dev"
      sql: |
        SELECT
          EXISTS (SELECT 1 FROM information_schema.columns
                  WHERE table_schema='public' AND table_name='appointments'
                    AND column_name='notes' AND data_type='text') AS notes_ok,
          NOT EXISTS (SELECT 1 FROM information_schema.routine_privileges
                      WHERE routine_schema='public' AND routine_name='create_appointment_atomic'
                        AND grantee='anon') AS anon_revoked_ok,
          EXISTS (SELECT 1 FROM information_schema.routine_privileges
                  WHERE routine_schema='public' AND routine_name='create_appointment_atomic'
                    AND grantee='authenticated') AS auth_granted_ok;
      expected: "{ notes_ok: true, anon_revoked_ok: true, auth_granted_ok: true }"

    - step: 3
      action: "Merge PR to main"
      command: "*push (creates PR if not exists, then *merge after CI green)"

    - step: 4
      action: "Wait for Vercel deploy"
      note: "PostgREST will refresh schema cache automatically (~30s after migration)"

    - step: 5
      action: "Smoke test prod URL"
      checks:
        - "GET /clientes — list renders without errors"
        - "GET /clientes/[id] — detail page renders, notes column reads OK"
        - "POST updateAppointmentNotes (via UI: edit notes, save, verify Salvo ✓)"
        - "POST softDeleteClient (via UI: remove a test client, verify redirect)"

  why_safe_to_apply_migration_first: |
    1. ALTER TABLE ADD COLUMN nullable, no default — does not lock the table for
       reads, no rewrite needed (Postgres uses metadata-only fast path)
    2. RPC change (CREATE OR REPLACE) is backward-compatible — old callers that
       didn't pass p_notes still work (DEFAULT NULL, NULL gets stored)
    3. New `notes` column is read-only by old app code (returns undefined since
       not in select string) — no runtime breakage
    4. REVOKE FROM PUBLIC + REVOKE FROM anon does not break old app — all
       legitimate callers go through `authenticated` role
    5. RLS unchanged — row-level policies cover the new column automatically

  rollback_plan:
    if_app_deploy_fails: |
      App rollback is enough — migration is forward-compatible.
      Old app version doesn't read appointments.notes, so it works fine
      against the new schema.
    if_migration_breaks_anything: |
      Unlikely (smoke test in dev passed), but:
        BEGIN;
        ALTER TABLE public.appointments DROP COLUMN IF EXISTS notes;
        -- Restore RPC v2 (without notes in INSERT)
        -- via re-running migration 20260422000005_fix_create_appointment_atomic_rpc.sql
        COMMIT;
      Cost: zero data loss (notes was empty in all rows immediately
      after apply since this is first deploy of the column).

