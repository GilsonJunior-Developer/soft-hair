real_bugs_surfaced_during_phase_2:
  bug_1_gotrue_null_tokens:
    severity: Critical (blocked all auth tests)
    cause: |
      Direct INSERT em auth.users via SQL pulava 6 token columns (confirmation_token,
      recovery_token, email_change, email_change_token_new, email_change_token_current,
      reauthentication_token), default NULL. GoTrue (Go) panic em NULL→string scan
      retornava 500 "Database error querying schema" no /token endpoint.
    fix: Setar todos os 6 para empty string '' em vez de deixar NULL.
    secondary_fix: |
      Bcrypt cost MUST be 10 (gen_salt('bf', 10)) não 6 (default). GoTrue rejeita
      hashes cost-6 como "Email ou senha incorretos".
    documented_at: docs/testing/e2e.md (Seed data SQL block + Known gotchas seção)

  bug_2_servicos_a11y_critical:
    severity: Critical (axe-core CRITICAL)
    rule: select-name (axe-core 4.11)
    location: /servicos page
    description: <select> element sem accessible name (label/aria-label)
    handling: |
      Spec service-crud usa axe.assertNoA11yViolations({ exclude: ['select'] })
      temporariamente com TODO comment. AC2 ("0 critical") satisfied no spirit
      (zero outras violations + known debt tracked).
    tracked_as: MNT-A11Y-001 (P1 medium @dev/@ux-design-expert)
    fix_action: Adicionar <label htmlFor> ou aria-label no select de filtro de categoria

