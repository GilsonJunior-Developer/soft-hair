notes:
  supabase_default_acl_gotcha: |
    **IMPORTANT discovery**: Supabase grants EXECUTE to `anon` EXPLICITLY (não via PUBLIC inheritance) quando uma SECURITY DEFINER function é criada/replaced. Memory `feedback_postgres_revoke_from_public.md` previa isso, mas confirmamos hoje em prática: `REVOKE FROM PUBLIC` sozinho não foi suficiente — anon ainda tinha EXECUTE depois do CREATE OR REPLACE.

    **Consequência prática:** todas as nossas SECURITY DEFINER functions chamadas APENAS por staff autenticado (ex: create_appointment_atomic, transition_appointment_status, etc.) deveriam fazer REVOKE explícito FROM anon após o GRANT. Auditoria:
      ```
      SELECT grantee, privilege_type FROM information_schema.routine_privileges
      WHERE routine_schema = 'public' AND routine_name = '<func_name>';
      ```
    Se anon aparecer e a função não for pública (`/agendamento/{token}` flow etc.), revogar.

    **Backlog suggestion (não bloqueia 2.5):** Audit script para listar todas as SD functions e seus grantees, pra catch em escala. Pode entrar como story de tech debt sob Epic 1 hardening ou Epic 4 (que tem mais SD functions financeiras).

  prod_deployment: |
    softhair-prod ainda NÃO recebeu a migration. Aplicar via release flow padrão antes do PR merge to main. Pode ser feita pelo @devops na PR creation OU manualmente por mim antes via:
      - mcp__supabase__apply_migration project_id=zqubqygagvtmvvljbstc

    Para máxima segurança, recomendo aplicar em prod APÓS o PR merge passar CI e antes do deploy do app — janela de migration desync é minimizada.

  rollback_plan: |
    Se necessário reverter:
      BEGIN;
      ALTER TABLE public.appointments DROP COLUMN IF EXISTS notes;
      -- Restaurar RPC v2 (sem notes no INSERT) executando 20260422000005
      COMMIT;

    Custo: zero data loss em dev (notes está vazio em todas as rows existentes pré-2026-04-27). Em prod, dependeria de quando aplicar — se já houver dados em notes, o DROP COLUMN destrói (tomar snapshot antes).

