mandatory_pre_push_sequencing:
  - id: "DEPLOY-001"
    severity: medium
    blocks_deploy: true
    blocks_push: false
    description: |
      Migration `20260502000000_story_4_1_professional_service_commissions`
      is applied to softhair-DEV ONLY (project_id oywizkjldmxhatvftmho).
      softhair-PROD (project_id zqubqygagvtmvvljbstc) does NOT yet have the
      table. App code on this branch references `professional_service_commissions`
      in 2 places (commission-table-panel + commission-simulator + Server
      Actions in profissionais/actions.ts). If you deploy app code to prod
      BEFORE applying migration, the matrix-mode professional detail page
      and simulator queries will fail.
    required_sequence: |
      1. Push branch + create PR
      2. CI runs (lint + typecheck + tests + e2e + build) — MUST be green
      3. Founder confirms (per memory reference_supabase_mcp_autonomy.md —
         prod schema changes always need explicit Founder confirmation)
      4. Apply migration to softhair-prod via mcp__supabase-project-softhair__
         apply_migration (project_id zqubqygagvtmvvljbstc, name=
         "story_4_1_professional_service_commissions", same SQL as the
         migration file). Migration is idempotent (CREATE IF NOT EXISTS).
      5. Verify on prod: list_tables shows the new table; pg_policies query
         shows the RLS policy; the 2 indexes exist (UNIQUE + idx_psc_
         professional_id).
      6. Merge PR (squash to main)
      7. Vercel auto-deploys app
      8. Smoke test on prod URL: open a professional in TABLE mode →
         verify matrix renders; open /configuracoes/comissao → verify
         simulator works. PostgREST may take ~30s to refresh schema cache.

