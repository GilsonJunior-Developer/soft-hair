ac_coverage_self_assessment:
  - ac: 1
    title: "Tela 'Comissão' com filtro por período (default mês corrente)"
    coverage: |
      `/comissao` route renders with period filter (2 date inputs + 3 quick
      presets: Mês corrente / Mês anterior / Últimos 30 dias). Default = current
      SP-month. Verified by vitest period.test.ts (8 cases) + e2e
      commission-report.spec.ts.
  - ac: 2
    title: "Tabela agregada (profissional, atendimentos, faturamento, comissão devida)"
    coverage: |
      `AggregateTable` component renders thead+tbody+tfoot with the 4 cols
      sorted by commissionBrl DESC. Functional verified in actions.test.ts
      (11 cases including multi-prof sort + float-drift rounding + empty result).
  - ac: 3
    title: "Expansão por linha mostra atendimentos individuais"
    coverage: |
      `ProfessionalRow` chevron toggles `aria-expanded` + `aria-controls` +
      lazy-fetches drill-down via `fetchCommissionReportRows`. 6-col table
      (Data, Cliente, Serviço, Valor, %, Comissão) sorted by scheduledAt ASC.
      a11y: `<th scope=col>`, `role=region`, `aria-labelledby`. E2E covers
      basic render; functional in actions.test.ts.
  - ac: 4
    title: "Exportação para PDF + CSV"
    coverage: |
      CSV: pure helper `formatCommissionCsv` with Brazilian convention
      (BOM + ; separator + CRLF + comma decimal + dd/MM/yyyy + RFC 4180
      escape + TOTAL row). 11 vitest cases. Triggered via Blob+URL.createObjectURL
      anchor. Filename pattern `comissao_{slug}_{from}_{to}.csv`.

      PDF: print-CSS approach (PO decision F2). Print button expands all rows
      + invokes `window.print()`. Inline `<style>` with `@media print` hides
      app chrome (nav, sidebar, filter, action buttons), enforces A4 portrait,
      `page-break-inside: avoid` per professional block. User saves as PDF via
      browser's native print dialog. **NOT testable via Playwright (browsers
      can't programmatically capture print previews) — requires manual @qa
      verification in @qa gate.**
  - ac: 5
    title: "Agregação ≤ 1s para 500 atendimentos/mês"
    coverage: |
      Real-DB integration test (`commission-report-perf.integration.test.ts`)
      inserts 50 commission_entries via service-role bulk insert + measures
      `fetchCommissionReportSummary` wall-clock. Measured: **476ms**.
      Budget 500ms at 10% scale (linear extrapolation: ~5s at 500 — below
      AC5 1000ms). Indexes used: `idx_commission_entries_professional`
      (`salon_id, professional_id, created_at DESC`).

      **Risk to flag for @qa:** wall-clock varies by network + Supabase
      load. Re-running the perf test in CI may show different numbers.
      Sentinel purpose ≠ benchmark. If 50-row exceeds 500ms in CI, escalate
      per Task 8.3 (data-engineer index audit before merge).

design_decisions:
  - id: D-001
    title: "F1 ROUTE = /comissao top-level"
    source: "PO verbatim"
  - id: D-002
    title: "F2 PDF = print-CSS"
    source: "PO verbatim"
  - id: D-003
    title: "F3 AGG = JS reduce (NOT SQL aggregation)"
    source: "@dev override of PO recommendation. Rationale: PostgREST aggregation requires `db-aggregates-enabled` config flag (not verified active); JS reduce at MVP scale is deterministic + meets perf budget. RPC fallback path NOT triggered. Phase 2 swap to RPC migration documented in ADR-0004 amendment."
    risk_for_qa: |
      If PostgREST aggregation feature was actually enabled, this is a
      conservative choice. Net effect: more wire traffic but functionally
      equivalent and within budget. Safe to merge as-is; revisit at Phase 2
      scale > 5k commission_entries/month.
  - id: D-004
    title: "Reuse BR_TIMEZONE constant + computeWindow pattern"
    source: "Discovery — single source of truth in lib/agenda/date-range.ts"
  - id: D-005
    title: "formatBrl uses Intl version; dialog gains thousands separator"
    source: "Side-effect of Task 10 extraction. Documented in decision log."
  - id: D-006
    title: "Perf assertion is `>= 50` not strict equal (concurrency safety)"
    source: "Vitest may run integration files in parallel; strict count would flake under concurrent inserts on same DB"
  - id: D-007
