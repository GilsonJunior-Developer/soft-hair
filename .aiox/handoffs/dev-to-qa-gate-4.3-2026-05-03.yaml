framework_hardening_collateral:
  description: |
    During develop, 2 fixes to `apps/web/integration/_setup/fixtures.ts`:

    1. `cleanupAppointment` now sets `status='CANCELED'` in addition to
       `deleted_at = NOW()`. The exclusion constraint
       `appointments_no_professional_overlap` only applies to PENDING/CONFIRMED
       statuses — soft-deleted PENDING rows accumulated as zombies that blocked
       future fixtures. Setting CANCELED frees the slot. Benefits all
       integration tests in this repo going forward.

    2. `createAppointment` now uses `pickRandomFutureSlot()` (per-call
       `Math.random()` over a 100-year window) instead of a module-level
       `scheduleSlot` counter. Vitest workers each had their own copy of
       the counter starting at 0, hitting the same time slots and tripping
       the exclusion constraint. Random slots have <0.001% collision at
       N=50 inserts.

  cleanup_executed:
    - "MCP execute_sql: cancelled 50 orphan PENDING test rows from prior sessions"

