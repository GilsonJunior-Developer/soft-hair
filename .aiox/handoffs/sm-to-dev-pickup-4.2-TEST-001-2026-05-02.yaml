risks_and_mitigations:
  - risk: "Test pollution em softhair-dev (fixtures órfãs)"
    mitigation: "salon_id randômico por test run + DELETE cascade em afterAll + idempotente"
  - risk: "Flakiness se múltiplos CI jobs concorrem no mesmo DB"
    mitigation: "salon_id randômico evita colisão; CI roda 1 job por PR; vitest serial mode pra integration suite"
  - risk: "Slow tests (DB roundtrip ~50-200ms cada)"
    mitigation: "Manter integration suite minimal (3-5 tests max); separar de `pnpm test`"
  - risk: "Service role key vazar em logs"
    mitigation: "`process.env.SUPABASE_SERVICE_ROLE_KEY` apenas; não logar; já é GH secret"

