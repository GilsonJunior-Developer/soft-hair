draft_summary: |
  First story of Epic 4 (Finance & Commission, MVP scope 4.1–4.4 only). Implements
  the rule resolution engine + storage for AC1(b) TABLE mode + simulator UI + tests.
  Heavy reliance on schema verification — found ~80% of needed schema already
  shipped in Story 1.1, AC2 already 100% implemented in Story 1.6, AC1(a) ~50%
  in Story 1.5. Story 4.1 closes the gap.

  6 ACs verbatim from PRD. 6 tasks (Task 1 conditional). CodeRabbit Integration
  populated (API/Backend primary, Database + Frontend secondary, complexity
  Medium-High). @dev light mode self-healing.

self_check_against_story_draft_checklist:
  result: READY
  clarity_score: 8
  partial_items:
    - "Self-Containment: 2 AC interpretations explicitly deferred to @po (with full trade-off analysis to support decision)"
  flags_for_po:
    - id: "FLAG-AC1B-INTERPRETATION"
      severity: HIGH
      desc: |
        AC1(b) TABLE mode is a design decision pending. Schema enum
        `commission_mode = ('PERCENT_FIXED', 'TABLE')` was planned in Story 1.1
        but TABLE mode never had backing data. Story 1.5 ships the radio
        but mode TABLE is inert today.

        SM recommends Interpretation A (new table `professional_service_commissions`
        for per-prof × per-service rates) because:
          - Literal reading of "tabela por serviço (overrides específicos)"
          - Story 1.5 already exposed TABLE radio — owners expect functionality
          - Differentiator vs Trinks/Avec depends on this flexibility

        Alternative B (TABLE = use service overrides only, zero schema change)
        is documented with full trade-off table in Dev Notes. @po picks A or B.

        Implication of choice:
          - A → Task 1 stays (migration), Task 3.1-3.2 stays (matrix UI), story
            stays Medium-High complexity
          - B → Task 1 skip, Task 3 rewrites as note, story drops to Low-Medium

    - id: "FLAG-AC3-SUM-100"
      severity: MEDIUM
      desc: |
        AC3 "Validação: total (% profissional + % salão) = 100%" — schema has no
        `salon_percent` field. SM recommends interpretation: salon share is derived
        (`100 - prof_pct`); UI displays this; validation is just the existing
        CHECK 0-100 on prof percent.

        Alternative (improbable): there's a stored salon_percent somewhere we
        missed. @po confirms.

    - id: "FLAG-SIMULATOR-LOCATION"
      severity: LOW
      desc: |
        Task 4.5 leaves the simulator's URL location ambiguous (`/financeiro/comissao`
        vs `/configuracoes/comissao`). `/financeiro` is currently a ComingSoon stub
        that says "ETA Epic 4". @po picks placement aligned with UX intent.

