  - "service_catalog tem 20 rows globais (read-only) — instanciar serviços a partir desses, NÃO inserir novos em service_catalog"
  - "phone_e164 é unique per salão — usar prefix +5511999000XXX pra não colidir com fixtures futuras"
  - "RLS está enabled em todas as tabelas — execute_sql via MCP usa service_role bypass, então RLS não afeta o seed; mas o app code com role authenticated precisa enxergar"
  - "appointment_status_log + commission_entries são populated via triggers — não inserir manualmente"

