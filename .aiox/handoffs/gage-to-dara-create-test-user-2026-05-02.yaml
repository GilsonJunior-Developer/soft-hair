execution_approach_recommended:
  preferred: |
    Criar como migration idempotente em supabase/migrations/, com prefix
    explicito "_e2e_test_user" + comentário "ONLY APPLY TO softhair-dev — DO NOT
    APPLY TO softhair-prod". Use INSERT ... ON CONFLICT DO NOTHING para idempotência.

    Pattern:
      1. Criar auth.user via supabase admin API ou direct INSERT em auth.users
         (com providers, email_confirmed_at, etc) — só aplicável em dev
      2. handle_new_auth_user trigger insere public.users automaticamente (se
         configurado); senão INSERT manual
      3. INSERT em salons + salon_members (role='owner')
      4. INSERT em professionals (FK salon_id)
      5. INSERT em services (FK salon_id; pode usar service_catalog id +
         override de price/duration)
      6. INSERT em clients (FK salon_id)

  alternative_if_migration_too_heavy: |
    Script standalone em supabase/seed/e2e-test-user.sql que pode ser rodado
    via supabase db reset --seed em dev. Não vai pra migrations/ history.
    Vantagem: nunca acidentalmente roda em prod.

