risks_to_register:
  - id: PERF-PROD-AT-SCALE
    severity: medium
    description: "AC5 budget (≤1s for 500 entries) is verified at 50-row scale in Task 8. If a partner's salon hits 500 atendimentos/mês during MVP launch, real perf may surface as Phase 2 follow-up."
    mitigation: "Task 8.3 escalation path documented (HALT and engage @data-engineer if 50-row test exceeds 500ms)."
  - id: CSV-LOCALE-EDGE-CASES
    severity: low
    description: "Brazilian Excel still has heterogeneous behavior across versions/macOS — BOM + ; + CRLF is the safest baseline, but a partner using Numbers or Google Sheets will see different parsing."
    mitigation: "Document expected viewer (Excel-BR) in story Completion Notes; add Phase 2 toggle for international comma format if Founder reports complaints."
  - id: PRINT-CSS-BROWSER-DRIFT
    severity: low
    description: "Print rendering subtly differs across Chrome/Firefox/Safari/Edge. Story tests in @qa gate against Chromium + Webkit (HARD.1 baseline) but Safari macOS print preview can show layout drift."
    mitigation: "@qa gate verifies on 2 browsers; document any Safari-only quirks in Phase 2 backlog."

