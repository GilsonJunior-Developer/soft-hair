scope_summary: |
  Story 4.3 is the FIRST READER of `commission_entries` — the snapshot table
  Story 4.2 writes to. Surface: new route /comissao with aggregate table
  (per professional) + drill-down expansion + period filter (default mês corrente)
  + CSV export (Brazilian payroll format) + PDF via print-CSS. Reuses integration
  test framework from 4.2-TEST-001 for AC5 perf budget validation.

  11 Tasks scoped covering 5 ACs + 4 cross-cutting concerns (bundled tech debt
  cleanup of 4.1-MNT-001 + 4.2-MNT-001 via 3rd-usage formatBrl extraction).

flags_for_po_validation:
  - id: F1
    title: "ROUTE-PLACEMENT"
    options:
      a: "/comissao top-level (matches PRD literal 'Tela Comissão')"
      b: "/financeiro/comissao sub-route (groups under existing nav)"
    sm_recommendation: "a"
    rationale: |
      PRD AC1 names it 'Tela \"Comissão\"' as standalone. Nav has 9 items
      already, one more is fine. Future could fold both under /financeiro
      if 4.4 wants nesting — easier to ungroup later than to migrate.

  - id: F2
    title: "PDF-STRATEGY"
    options:
      a: "print-CSS (zero dep, browser handles 'Save as PDF')"
      b: "@react-pdf/renderer (~100kb, full layout control)"
      c: "server-side Puppeteer (heaviest, highest fidelity)"
    sm_recommendation: "a"
    rationale: |
      PRD AC4 says 'formatado para impressão' literally. Print-CSS aligns
      directly. Zero new dependency. Modern browsers all have 'Save as PDF'
      in print dialog. Defer (b) to Phase 2 if a partner reports friction.

  - id: F3
    title: "AGG-STRATEGY"
    options:
      a: "SQL aggregation in Server Action (.from().select() with sum/count)"
      b: "Fetch raw rows + JS reduce"
    sm_recommendation: "a"
    rationale: |
      AC5 perf budget (≤1s for 500 atendimentos) is trivial in SQL with
      existing index `idx_commission_entries_professional`. JS reduce moves
      N rows over wire when only K (=professional count, ~3-10) need to
      display in aggregate. Drill-down (Task 2) fetches raw separately on
      row expansion only.

bundling_decisions_to_validate:
  - id: TASK_10_BUNDLE
    title: "formatBrl extraction (4.1-MNT-001 + 4.2-MNT-001)"
    description: |
      Story 4.3 is the 3rd usage of currency formatting (after
      commission-simulator.tsx + appointment-detail-dialog.tsx). Backlog
      flagged 'extract at 3rd-usage threshold'. Task 10 bundles this cleanup.
    sm_recommendation: "Bundle (Task 10 stays in story)"
    rationale: |
      Story 4.3 naturally introduces the 3rd usage. Doing extraction in
      a separate refactor PR fragments review. Marked 'bundleable, not
      blocking' so @po can de-bundle if scope concerns surface.
    de_bundle_path: "Move Task 10 to a follow-up PR; keep 4.3 focused on report"

  - id: ADR_AMENDMENT
    title: "ADR-0004 amendment for read-pattern + period-scoping"
    description: |
      Task 11.1 appends section to `docs/architecture/decisions/0004-commission-rule-resolution.md`
      documenting (a) read snapshot data only (never recompute) and (b) period
      scoping defaults to commission_entries.created_at (vs scheduled_at).
    sm_recommendation: "Include in story"
    rationale: |
      Establishes durable convention that prevents future drift (e.g. someone
      writing a 'live' report that recomputes from current rules). ADR
      precedent established in 4.1 + 4.2 — continuity expected.

