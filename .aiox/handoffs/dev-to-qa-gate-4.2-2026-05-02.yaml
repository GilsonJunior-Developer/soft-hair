risks_for_qa_to_assess:
  - id: "QA-RISK-1"
    severity: low
    desc: |
      Test fixture uses UUID v4 shape (`11111111-1111-4111-8111-111111111111`).
      Previously the test used a non-versioned UUID and Zod 4 .uuid() rejected
      it as "Dados inválidos". Lesson logged in decision-log-4.2.md as a
      future-tester gotcha. No production impact.
  - id: "QA-RISK-2"
    severity: low
    desc: |
      Story 4.2 is the first writer to commission_entries. The architectural
      decision (Server Action, not RPC) means status update + commission
      insert are NOT atomic. Failure mode: status=COMPLETED but no
      commission row. Recovery via structured logs + future backfill job.
      QA may want to add a backlog item to track when (if ever) this needs
      a reconciliation worker.
  - id: "QA-RISK-3"
    severity: low
    desc: |
      No E2E (Playwright) coverage added for commission display. Story
      Dev Notes marked E2E as recommended hygiene, not requirement (waiver
      WAIVER-E2E-4.2). Could be bundled with 4.1-TEST-002 follow-up.
  - id: "QA-RISK-4"
    severity: low
    desc: |
      AppointmentDetailDialog change is small (1 Row addition) but doesn't
      have its own component test. Dialog already had no tests pre-4.2.
      Optional improvement: add component-level test for the conditional
      render. Not blocking.

