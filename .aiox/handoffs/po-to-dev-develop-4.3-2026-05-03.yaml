decisions_resolved:
  - id: F1-ROUTE-PLACEMENT
    decision: "(a) /comissao top-level"
    rationale: |
      PRD AC1 names "Tela 'Comissão'" as standalone surface. User mental
      model is "vou pagar comissão" not "vou ao financeiro pra ver comissão".
      Story 4.4 keeps /financeiro as separate dashboard. Future re-grouping
      under /financeiro is cheap if 4.4 surfaces a need.
    affects_tasks: [3.1, 3.4, 4.1]
    no_task_path_change_needed: true

  - id: F2-PDF-STRATEGY
    decision: "(a) print-CSS"
    rationale: |
      PRD AC4 literal "formatado para impressão" maps directly to print
      stylesheet. Zero new dependency. "Save as PDF" via browser print
      dialog cover deliverable. @react-pdf/renderer (~100kb) deferred
      to Phase 2 if Founder reports user friction with print dialog.
    affects_tasks: [6]
    no_task_path_change_needed: true

  - id: F3-AGG-STRATEGY
    decision: "(a) SQL aggregation with RPC fallback"
    rationale: |
      AC5 perf budget (≤1s for 500 atendimentos) trivial in SQL with
      existing index. JS reduce moves N rows over wire when only K need
      to display. Drill-down (Task 2) fetches raw separately on click.
      If `select=col,col.sum()` URL syntax has gotchas at runtime,
      escalation path: @data-engineer creates RPC `fetch_commission_summary`
      migration. Document fallback decision if taken.
    affects_tasks: [1.4]
    no_task_path_change_needed: true

  - id: BUNDLE-TASK-10
    decision: APPROVED (stays in story)
    rationale: |
      3rd-usage threshold met (commission-simulator + appointment-detail-dialog
      + new comissao-report). Closes 4.1-MNT-001 + 4.2-MNT-001 atomically.
      Doing in separate PR fragments review.
    constraint: |
      SCOPE STRICT — Task 10 is APENAS extract `formatBrl` to
      `apps/web/lib/format.ts` + update 2 import sites + use in new code.
      DO NOT refactor commission-simulator.tsx or appointment-detail-dialog.tsx
      further (e.g. don't move other helpers, don't restructure components).
      If Dex sees opportunity, file as separate backlog item.

  - id: BUNDLE-ADR-AMENDMENT
    decision: APPROVED (Task 11.1 stays)
    rationale: |
      Continuity from 4.1 + 4.2 ADR-0004 amendments. Establishes durable
      "snapshot data is read-only" convention preventing future drift.
      Documents period-scoping default (created_at) + Phase 2 toggle path.

unknowns_resolved:
  - id: PERF-TEST-SCALE
    question: "50-row vs 500-row perf test in Task 8?"
    decision: "50 rows (River default)"
    rationale: |
      50 rows with realistic JOIN cost extrapolates linearly via DB query
      plan. 500-row stress test deferred — Task 8.3 escalation path
      (HALT + escalate to @data-engineer if 50-row exceeds 500ms) provides
      sentinel coverage. If Founder reports prod perf issues at scale,
      run 500-row stress test as Phase 2 hardening.

  - id: UX-EXPERT-PRE-REVIEW
    question: "@ux-design-expert review BEFORE @dev or at @qa gate?"
    decision: "Defer to @qa gate (no pre-dev review)"
    rationale: |
      Print-CSS is well-understood pattern. @dev follows common patterns
      (hide nav/sidebar, force expanded rows visible, page-break-inside:
      avoid, right-align numerics, header with salon+period). @qa verifies
      print preview in 2 browsers (Chromium + Webkit) at gate.

  - id: PERIOD-SCOPING-DEFAULT
    question: "created_at vs scheduled_at as filter column default?"
    decision: "created_at"
    rationale: |
      Matches "fechamento mensal" mental model — owner says "vou fechar Maio"
      meaning "todas comissões calculadas em Maio". Late-marked appointments
      (rare edge case) appear in the month they were marked COMPLETED, not
      service month. Phase 2 toggle path documented in ADR-0004 amendment.

findings_to_address:
  - id: TIMEZONE-FINDING-4.3-001
    severity: medium
    blocks_merge: false
    blocks_merge_reason: |
      Caught at validation, must address during *develop. Not blocking
      development from starting — flagged as required Task 1.5 + Task 3.1
      adjustment (already updated in story file v0.2).
    description: |
      Original story Task 3.1 said "current month start → next month start
      (UTC, BR business convention)" — contradictory. UTC and BR convention
      diverge by ~3h (UTC-3). Salon owner em São Paulo pedindo "Maio"
      espera "Maio em horário SP" — appointment às 23h SP de 30/Abril
      cai em Maio se filtrar por UTC.
    fix_required: |
      Use `date-fns-tz` (já em apps/web/package.json deps) para computar
      boundaries em `America/Sao_Paulo`:
        from = startOfMonth(now, { timezone: 'America/Sao_Paulo' })  // midnight SP do dia 1
        to   = startOfMonth(addMonths(now, 1), { timezone: 'America/Sao_Paulo' })
      Convert pra ISO via `formatInTimeZone(date, 'America/Sao_Paulo', "yyyy-MM-dd'T'HH:mm:ssXXX")`
      ou equivalent — passa para Server Action como Date.
    test_to_add: |
      Vitest case: appointment com scheduled_at = '2026-04-30T23:30:00-03:00'
      (= '2026-05-01T02:30:00Z' UTC) deve aparecer em "Abril" report,
      NÃO em "Maio". Ie. boundary check em SP timezone.
    affects_tasks: [1.5, 3.1, 7.2]
    story_file_already_updated: true

