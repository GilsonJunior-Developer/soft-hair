risks_for_qa_to_assess:
  - id: "QA-RISK-1"
    severity: low
    desc: |
      Migration applied to softhair-dev only. softhair-prod will be applied
      separately at deploy time. QA should verify the migration SQL is
      idempotent (uses IF NOT EXISTS) and the rollback SQL is correct before
      pushing to prod.
  - id: "QA-RISK-2"
    severity: low
    desc: |
      AC5 is structurally enforced (engine doesn't write to commission_entries).
      The rejection-grade integration test described in story Dev Notes lines
      235-243 is more relevant for Story 4.2 (where the actual insert happens).
      QA may want to add an explicit DB-level test in 4.2 that updates a rule
      and asserts existing commission_entries unchanged.
  - id: "QA-RISK-3"
    severity: low
    desc: |
      UI matrix tested via vitest unit (logic) but NOT via Playwright E2E. HARD.1
      established the E2E baseline; story Dev Notes mark E2E as "non-blocking,
      recommended hygiene". QA may waive or request follow-up. Bulk helper +
      progressive disclosure are well-defined contracts and could be added as
      backlog item rather than blocker.
  - id: "QA-RISK-4"
    severity: low
    desc: |
      RLS policy on professional_service_commissions uses FOR ALL (paridade
      com professionals_all/services_all). PROFESSIONAL role members have
      write access via RLS — convention from Story 1.1 leaves role gating to
      app layer. Story 4.1 doesn't enforce role at app layer either (any
      logged-in salon member can call the Server Actions). If stricter gating
      is required, that's a backlog item (likely OBS or VAL category) — not
      a blocker for this story since it matches existing convention.

