acceptance_criteria_self_assessment:
  - ac: 1
    status: PASS
    evidence: |
      Mode PERCENT_FIXED already shipped Story 1.5 (radio + default_percent).
      Mode TABLE now backed by professional_service_commissions table + UI
      matrix. Both modes resolved by resolveRate() in apps/web/lib/commission/.
      Test coverage: 12 vitest scenarios covering all permutations.
  - ac: 2
    status: PASS_PRE_EXISTING
    evidence: |
      services.commission_override_percent + service-form persistence shipped
      Story 1.6. Engine consumes it in tier 2 of precedence rule (resolveRate
      line 36). resolve-rate.test.ts:33-41 covers PERCENT_FIXED+override path;
      :60-72 covers TABLE-fallback-to-override path.
  - ac: 3
    status: PASS
    evidence: |
      UI shows salon share derived as `100 - prof_pct` in real-time (commission
      -table-panel.tsx:269 + simulator). Schema CHECK (5,2 + BETWEEN 0 AND 100)
      enforces range. No salon_percent stored field needed.
  - ac: 4
    status: PASS
    evidence: |
      apps/web/app/(dashboard)/configuracoes/comissao/commission-simulator.tsx
      renders dropdowns + qty + price inputs; useMemo recomputes resolveRate +
      calculateCommission on input change; output text matches PRD example
      format. Source label badge ("tabela do profissional" | "override do
      serviço" | "default do profissional") shown for transparency.
  - ac: 5
    status: PASS_INVARIANT_HELD
    evidence: |
      Engine code is pure (apps/web/lib/commission/) — does not import any
      Supabase client. Server Actions in profissionais/actions.ts only
      reference professional_service_commissions (new table), never
      commission_entries. Verified structurally: `grep -r 'UPDATE.*commission_
      entries' apps/web/` returns ZERO matches. Story 4.2 will be the first
      writer to commission_entries.
  - ac: 6
    status: PASS
    evidence: |
      26 vitest tests in apps/web/lib/commission/{resolve-rate,calculate}.test.ts.
      Coverage: precedence (3 tiers + 2 fallbacks), boundaries (0%, 100%),
      meaningful-zero distinction (entry=0 vs null), defensive (mode mismatch),
      math (PRD example, simple, zero, 100%, large numbers), rounding HALF_UP
      (33.33%×R$10=3.33, 33.33%×R$9.97=3.32, 0.5-cent boundary), float drift
      avoidance (0.1×30%=0.03 exact), input validation throws (negative price,
      percent out of range), discounted-price contract.

