key_design_decisions_to_make_during_draft:
  - id: "WHERE-CALC-LIVES"
    desc: |
      Where does the calc happen? Two options:
      A) **Server Action** triggered by UI when staff clicks "Mark COMPLETED" — pure JS, easy to test, but client-driven
      B) **DB trigger or RPC** on appointments status transition to COMPLETED — server-side authoritative, harder to test
      C) **Hybrid:** Server Action calls an RPC `transition_appointment_status` (already exists per Story 2.6 migration `20260422000004`) which inserts the commission_entries row in same transaction.

      Recommend **Option C** (hybrid via existing RPC). The transition RPC already exists and changes status. Extending it to also INSERT into commission_entries when the new status is COMPLETED is atomic + reuses existing security boundary.

      Need to verify: does RPC `transition_appointment_status` already do anything commission-related? If not, story extends it.
  - id: "DISCOUNT-CONTRACT"
    desc: |
      AC4: "comissão calculada sobre valor descontado". Engine's `calculateCommission` already takes
      `servicePriceBrl` as discounted price (caller responsibility per Story 4.1 jsdoc).
      Story 4.2 just needs to pass `appointments.price_brl_final` (which is post-discount) instead of `price_brl_original`. Verify schema column semantics.
  - id: "RULE-RESOLUTION-TIMING"
    desc: |
      AC1 says "regra vigente" — apply rule at COMPLETED time, not at appointment-create time.
      Snapshot pattern already designed for this (Story 4.1 ADR-0004). Engine resolves rate from
      current professional + service + table_entry state at the moment of COMPLETED transition.
  - id: "UI-DISPLAY-LOCATION"
    desc: |
      AC3: card do agendamento exibe comissão pós-conclusão. Today the agenda card lives in
      `apps/web/app/(dashboard)/agenda/`. Story should add a small commission line/badge that
      appears only when `appointment.status === 'COMPLETED'` AND `commission_calculated_brl IS NOT NULL`.
      Format: "Comissão: R$ X,XX" (formatBrl from commission-simulator can be reused).
  - id: "MULTIPLE-SERVICES-PER-APPOINTMENT"
    desc: |
      AC5 mentions "múltiplos serviços no mesmo agendamento". Schema currently has appointments
      with a single `service_id` (1:1). If multi-service is in scope, that's a schema change beyond 4.2.
      **Likely interpretation:** AC5 just means "test the rule resolution across multiple service types",
      i.e., calc one commission per appointment but verify the engine handles different services (corte, coloração, etc.) correctly. Confirm with @po during validation.

