    - id: AC3
      desc: "5 specs E2E cobrindo happy path + edge cases (1.5 prof CRUD, 1.6 service CRUD, 1.7 dashboard hoje, 2.4 self-booking ≤60s, 2.5 client lista→detail→notes→soft-delete)"
