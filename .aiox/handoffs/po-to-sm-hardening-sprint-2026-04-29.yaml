scope_recommendation:
  approach: "Single hardening story (mini-épico de tooling/qualidade), não múltiplas stories pequenas"
  rationale: |
    Os 7 items são fortemente acoplados — vão dividir o mesmo setup, mesmas configs,
    mesmo CI workflow. Múltiplas stories criariam overhead de coordenação sem benefício.
    Trate como UMA story chunky com Tasks múltiplas (8-12 tasks).

  suggested_story_id: "HARD.1 ou 2.8"
  suggested_story_title: "Hardening sprint pré-Epic 3 — E2E Playwright + axe-core + Node 20 update"

