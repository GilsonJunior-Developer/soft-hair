decisions_for_po:
  decision_1_qa_review:
    question: "Rodar @qa *review HARD.1 antes de close-story, ou skip QA review?"
    path_a_run_qa:
      pros:
        - "Workflow chain canônico (Story Lifecycle Phase 4 — QA Gate)"
        - "Quinn dá manual code review independente do que o Dex auto-validou"
        - "Posiciona pra futuras stories (sets the rhythm)"
      cons:
        - "CodeRabbit local não roda (mesma situação de Phase 1 + 2.5/2.7)"
        - "Substantial overlap com self-validation já feita pelo Dex"
        - "Bottleneck na velocidade de delivery"
    path_b_skip_qa:
      pros:
        - "CI 7/7 verde + Vitest 37/37 + 18 E2E specs passing já são strong signal"
        - "Real bugs já surfaced + tracked (MNT-A11Y-001, GoTrue gotcha) — Quinn não vai achar mais"
        - "Self-critique check do Dex aplicada (story-dod-checklist mental)"
        - "Phase 1 já mergeou sem QA review e ficou estável (precedente)"
      cons:
        - "Bypassa um gate canônico"
        - "Se algo critical passar despercebido, descobrimos em produção"
    recommendation_devops: |
      Lean Path B (skip QA) por: CI 7/7 verde + zero CRITICAL fora do tracked
      + precedente das Stories 2.5/2.7. Mas a decisão é exclusiva @po.
      Se Path A: @qa *review HARD.1, depois @po *close-story.
      Se Path B: @po *close-story HARD.1 direto.

  decision_2_pr_un_draft_timing:
    question: "Quando un-draftar PR #30? Antes ou depois do *close-story?"
    options:
      now: |
        Marca PR como ready for review/merge imediatamente. Permite human
        reviewer (Founder) approve antes do *close-story. Default GitHub flow.
      after_close_story: |
        @po close-story actually é o gate. Un-draft é cosmetic — apenas remove
        o "draft" badge. Squash merge pode ser feito mesmo se PR estiver draft
        (with admin override).
    recommendation_devops: "Un-draft junto com merge (mais limpo); ou un-draft after PO close-story se quiser human approval visible."

  decision_3_squash_merge_timing:
    question: "Quem pode disparar squash merge?"
    answer: |
      @devops (eu) tem autoridade exclusiva. Após @po *close-story (que vai
      atualizar Status: Ready for Review → Done + marcar 7 P0 backlog itens
      done), eu posso `gh pr merge 30 --squash` quando autorizado pelo Founder.

