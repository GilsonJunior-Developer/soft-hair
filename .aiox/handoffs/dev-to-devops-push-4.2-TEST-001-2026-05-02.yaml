design_decisions:
  - decision: "Use existing test salon instead of creating fresh ones"
    why: "create_salon_bootstrap RPC requires auth.uid() which service role does not provide. Using the documented fixture from HARD.1/docs/testing/e2e.md keeps surface minimal and means tests skip cleanly when fixture is missing."
  - decision: "Soft-delete appointments + hard-delete commission_entries on cleanup"
    why: "Cascade DELETE on appointments fires the status_log immutability trigger (`prevent_credits_log_mutation`) which blocks the operation. Verified empirically via MCP probe before writing the helper. Soft-deleted appts are filtered out by `deleted_at IS NULL` in app queries; status_log accumulating is fine — it is audit data."
  - decision: "Pin fixture UUIDs in env.ts instead of querying by name"
    why: "Tests fail loudly if the fixture drifts (e.g. `4e5b99ca-...` no longer exists). Querying by slug/name would silently target a different salon and produce confusing failures."
  - decision: "Mock @/lib/supabase/server.createClient instead of running through real auth"
    why: "The bug class we defend against (PR #33 PostgREST embed shape) is in query syntax, not RLS. Service role bypasses RLS for fast deterministic setup. RLS is exercised separately by packages/db/tests/rls-smoke.test.ts."
  - decision: "Add env block to lint-test-build job in CI (not a separate integration-tests job)"
    why: "Follows the existing pattern from packages/db/tests/rls-smoke.test.ts which already used hasCredentials skip-if. One job is simpler and matches the team convention. Side-benefit: rls-smoke now actually runs in CI (it was silently skipping before because the env was never injected)."

pr_metadata_suggestion:
  title: "test(commission): 4.2-TEST-001 — real DB integration tests via service-role client"
  body: |
    Closes `4.2-TEST-001` (P1, promoted from P2 after the Story 4.2 PostgREST
    embed bug + PR #33 hotfix). Bundleado ANTES de Story 4.3 conforme Path A
    autorizado pelo Founder.

    ## What
    3 integration tests in `apps/web/integration/commission-calculation.integration.test.ts`
    exercise `transitionAppointmentStatus` against `softhair-dev` with real
    PostgREST roundtrips:

    1. **PERCENT_FIXED + service override** → engine consumer flow writes
       `commission_entries` (Coloração 60% override beats 50% prof default → R$ 90).
    2. **AC5 immutability** — mutating `professionals.commission_default_percent`
       does NOT touch a prior `commission_entries` snapshot.
    3. **TABLE mode + per-(prof, service) entry** → Tier 1 wins over Tier 2 service
       override (R$ 105).

    ## Why
    Mock-based unit tests (37 → 77 baseline post-Story 4.2) did not catch the
    PostgREST embed shape mismatch from PR #33. This suite is the regression
    sentinel: re-introducing `from('appointments').select('..., professionals!inner(...)')`
    will fail visibly via real PostgREST roundtrip.

    ## How
    - `@/lib/supabase/server.createClient` mocked to return a service-role client
    - Pinned fixture IDs from `docs/testing/e2e.md` (HARD.1 test salon)
    - Cleanup: hard-delete `commission_entries`, soft-delete `appointments`
      (cascade blocked by status_log immutability trigger — verified empirically)

    ## CI
    `lint-test-build` gains an env block injecting the 3 Supabase secrets
    (HARD.1 already added them). Side-benefit: `packages/db/tests/rls-smoke.test.ts`
    now actually runs in CI — was silently skipping before.

    ## Verification
    - Vitest `apps/web`: 80/80 ✓ (was 77, +3 integration)
    - Vitest `packages/db`: 20/20 ✓ (rls-smoke now active)
    - Lint / typecheck / build: clean
    - Cleanup probe via MCP: 0 orphan rows, prof1 fully restored

