flags_resolved_by_po:
  - id: "FLAG-WORKER-VS-ACTION"
    severity: medium
    resolution: "Option B (Server Action post-RPC) APPROVED."
    rationale: |
      (i) No queue infra (Inngest = Phase 2 territory); (ii) JS engine
      preserves testability without DB mocks; (iii) AC5 immutability
      satisfied by engine purity, not by transaction atomicity; (iv) UNIQUE
      constraint on commission_entries.appointment_id provides idempotency
      structurally; (v) failure mode (commission insert fails after status
      change) is recoverable via future backfill — transition is source of
      truth, commission is derived data.
    mandatory_caveat: |
      Task 1.6 MUST use structured logging:
      `console.error('[transitionAppointmentStatus][commission]',
       { appointmentId, reason: err.message ?? 'unknown' })`
      Rationale: enables grep-based gap detection for reconciliation if
      the failure mode bites in production.

  - id: "FLAG-AC5-MULTI-SERVICE"
    severity: low
    resolution: "SM interpretation (test matrix of service types) APPROVED."
    rationale: |
      Schema is 1:1 (`appointments.service_id` is single UUID). Forcing
      multi-service per appointment would require schema redesign + UI
      rewrite — epic-level scope. PRD wording was likely emphasizing
      "engine handles diverse service rates" which the test matrix covers
      (PERCENT_FIXED + service_override + TABLE entries across multiple
      service categories).

  - id: "FLAG-CARRY-OVER-BUNDLING"
    severity: low
    resolution: "APPROVED — Tasks 5 + 3.4 absorb 4.1-DOC-001 + 4.1-TEST-001."
    rationale: |
      4.1-DOC-001 (jsdoc fix in calculate.ts) — same file Story 4.2 imports
      from; 2-min fix with same review context. 4.1-TEST-001 (Server Action
      integration tests for commission actions) — same testing harness as
      Story 4.2's new tests; same Supabase mock pattern. Bundling saves
      context switch. 4.1-MNT-001 (panel DRY refactor) stays separate
      because it touches existing 4.1 UI, not 4.2's new code.

  - id: "FINDING-AC2-DATA-ATENDIMENTO"
    severity: low
    note: "Not a blocking flag — additional clarity added during validation"
    resolution: "AC2 `data_atendimento` mapped via JOIN to `appointments.scheduled_at`, NOT new column."
    rationale: |
      `commission_entries.created_at` (existing) records WHEN the calc
      happened (= COMPLETED transition time), which can drift from when the
      service was rendered if staff marks COMPLETED late. The canonical
      service date is `appointments.scheduled_at`; queries should JOIN to
      get it. Story 4.3 (monthly report) will need the JOIN anyway for
      client name + service name. Denormalizing into commission_entries
      adds maintenance cost without read benefit.

